<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Flow Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0e1a;
    color: #c8d4e8;
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #e8edf5;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #4a6080;
    margin-top: 6px;
    letter-spacing: 0.12em;
  }

  .card {
    background: #111827;
    border: 1px solid #1e2d42;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 720px;
  }

  svg text { font-family: 'JetBrains Mono', monospace; }

  .th { font-size: 13px; font-weight: 600; fill: #e8edf5; }
  .ts { font-size: 11px; font-weight: 400; fill: #6a85a8; }
  .t  { font-size: 12px; font-weight: 400; fill: #c8d4e8; }

  .node-purple rect  { fill: #1a1535; stroke: #534AB7; }
  .node-purple text  { fill: #b0a8ee; }
  .node-blue rect    { fill: #0d1e33; stroke: #185FA5; }
  .node-blue text    { fill: #7eb8f5; }
  .node-amber rect   { fill: #1e1506; stroke: #BA7517; }
  .node-amber text   { fill: #e8b96a; }
  .node-coral rect   { fill: #1e0d08; stroke: #993C1D; }
  .node-coral text   { fill: #e89070; }
  .node-teal rect    { fill: #071a13; stroke: #0F6E56; }
  .node-teal text    { fill: #5dcaa5; }
  .node-gray rect    { fill: #141a24; stroke: #3a4a60; }
  .node-gray text    { fill: #8a9ab8; }

  line.arr, path.arr {
    stroke: #2a3d5a;
    stroke-width: 1.2px;
    fill: none;
    marker-end: url(#arrow);
  }
  line.dash, path.dash {
    stroke: #1e3050;
    stroke-width: 0.8px;
    stroke-dasharray: 5 3;
    fill: none;
    marker-end: url(#arrow);
  }

  .machine-box {
    fill: none;
    stroke: #1e3050;
    stroke-width: 0.8px;
    stroke-dasharray: 6 4;
  }

  footer {
    margin-top: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #2a3d5a;
    letter-spacing: 0.1em;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Network Flow Diagram</h1>
  <p>ISP → Core Router → Core Switch → Distribution → Rooms // Technicians office side branch</p>
</header>

<div class="card">
<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#2a3d5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Machine room boundary -->
<rect class="machine-box" x="10" y="96" width="640" height="316" rx="12"/>
<text class="ts" x="22" y="114" dominant-baseline="central" opacity="0.7">Machine room</text>

<!-- ISP Router -->
<g class="node-gray">
<rect x="240" y="20" width="200" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Router_ISP</text>
</g>

<line class="arr" x1="340" y1="64" x2="340" y2="104" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="88" dominant-baseline="central">203.0.113.x</text>

<!-- Core Router -->
<g class="node-purple">
<rect x="240" y="104" width="200" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="340" y="122" text-anchor="middle" dominant-baseline="central">Router_Core</text>
<text class="ts" x="340" y="138" text-anchor="middle" dominant-baseline="central">NAT + default route</text>
</g>

<line class="arr" x1="340" y1="148" x2="340" y2="188" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="172" dominant-baseline="central">192.168.1.x</text>

<!-- Core Switch -->
<g class="node-purple">
<rect x="240" y="188" width="200" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central">SW_Core (L3)</text>
<text class="ts" x="340" y="226" text-anchor="middle" dominant-baseline="central">SVIs · inter-VLAN · ACLs</text>
</g>

<!-- Server -->
<line class="arr" x1="340" y1="244" x2="340" y2="272" marker-end="url(#arrow)"/>
<g class="node-teal">
<rect x="240" y="272" width="200" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="340" y="292" text-anchor="middle" dominant-baseline="central">Server_Main</text>
<text class="ts" x="340" y="310" text-anchor="middle" dominant-baseline="central">DHCP · DNS · 192.168.99.2</text>
</g>

<!-- Distribution Switch -->
<line class="arr" x1="340" y1="328" x2="340" y2="356" marker-end="url(#arrow)"/>
<g class="node-purple">
<rect x="240" y="356" width="200" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="340" y="376" text-anchor="middle" dominant-baseline="central">SW_Distribution</text>
<text class="ts" x="340" y="394" text-anchor="middle" dominant-baseline="central">Aggregates all room trunks</text>
</g>

<!-- Room Access Switch -->
<line class="arr" x1="340" y1="412" x2="340" y2="440" marker-end="url(#arrow)"/>
<g class="node-blue">
<rect x="200" y="440" width="280" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="340" y="460" text-anchor="middle" dominant-baseline="central">SW_Office_01 to SW_Office_12</text>
<text class="ts" x="340" y="478" text-anchor="middle" dominant-baseline="central">One switch per active office room</text>
</g>

<!-- End devices -->
<line class="arr" x1="340" y1="496" x2="340" y2="530" marker-end="url(#arrow)"/>

<g class="node-blue">
<rect x="30" y="530" width="120" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="90" y="552" text-anchor="middle" dominant-baseline="central">PC ×4 — desk</text>
</g>
<g class="node-blue">
<rect x="165" y="530" width="120" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="225" y="552" text-anchor="middle" dominant-baseline="central">PC ×4 — desk</text>
</g>
<g class="node-blue">
<rect x="300" y="530" width="120" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="360" y="552" text-anchor="middle" dominant-baseline="central">PC ×4 — desk</text>
</g>
<g class="node-coral">
<rect x="435" y="530" width="130" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="500" y="548" text-anchor="middle" dominant-baseline="central">AP_Office</text>
<text class="ts" x="500" y="564" text-anchor="middle" dominant-baseline="central">VLAN 20 · Staff_WiFi</text>
</g>

<path class="arr" d="M340 530 L90 530" marker-end="url(#arrow)"/>
<path class="arr" d="M340 530 L225 530" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="530" x2="360" y2="530" marker-end="url(#arrow)"/>
<path class="arr" d="M340 530 L500 530" marker-end="url(#arrow)"/>

<text class="ts" x="210" y="592" text-anchor="middle">VLAN 10 · 192.168.10.x via DHCP</text>
<text class="ts" x="500" y="592" text-anchor="middle">WPA2-PSK · 192.168.20.x</text>

<!-- ── TECHNICIANS OFFICE BRANCH ── -->
<path class="dash" d="M440 216 L570 216 L570 316" marker-end="url(#arrow)"/>
<text class="ts" x="516" y="208" text-anchor="middle">direct wired link</text>

<text class="th" x="570" y="305" text-anchor="middle" dominant-baseline="central" style="fill:#e8b96a">Technicians' office</text>

<g class="node-amber">
<rect x="490" y="316" width="160" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="570" y="338" text-anchor="middle" dominant-baseline="central">SW_Tech_01</text>
</g>
<line class="arr" x1="570" y1="360" x2="570" y2="400" marker-end="url(#arrow)"/>
<g class="node-amber">
<rect x="490" y="400" width="160" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="570" y="422" text-anchor="middle" dominant-baseline="central">SW_Tech_02</text>
</g>
<line class="arr" x1="570" y1="444" x2="570" y2="484" marker-end="url(#arrow)"/>
<g class="node-amber">
<rect x="490" y="484" width="160" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="570" y="504" text-anchor="middle" dominant-baseline="central">Tech PCs ×2</text>
<text class="ts" x="570" y="522" text-anchor="middle" dominant-baseline="central">Maintenance ports ×4</text>
</g>
<line class="arr" x1="570" y1="540" x2="570" y2="560" marker-end="url(#arrow)"/>
<g class="node-coral">
<rect x="490" y="560" width="160" height="44" rx="8" stroke-width="0.8"/>
<text class="th" x="570" y="578" text-anchor="middle" dominant-baseline="central">AP_TechOffice</text>
<text class="ts" x="570" y="594" text-anchor="middle" dominant-baseline="central">VLAN 20 · staff Wi-Fi</text>
</g>

<!-- ── OTHER ROOMS ── -->
<text class="ts" x="200" y="650" text-anchor="middle" opacity="0.6">Also connected via SW_Distribution:</text>

<path class="dash" d="M340 412 L340 638 L75 638 L75 664" marker-end="url(#arrow)"/>
<path class="dash" d="M340 412 L340 638 L200 638 L200 664" marker-end="url(#arrow)"/>
<path class="dash" d="M340 412 L340 638 L325 638 L325 664" marker-end="url(#arrow)"/>
<path class="dash" d="M340 412 L340 638 L455 638 L455 664" marker-end="url(#arrow)"/>

<g class="node-blue">
<rect x="15" y="664" width="120" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="75" y="684" text-anchor="middle" dominant-baseline="central">Reception</text>
<text class="ts" x="75" y="702" text-anchor="middle" dominant-baseline="central">VLANs 10,20,30,40</text>
</g>
<g class="node-blue">
<rect x="148" y="664" width="104" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="200" y="684" text-anchor="middle" dominant-baseline="central">Kitchen</text>
<text class="ts" x="200" y="702" text-anchor="middle" dominant-baseline="central">VLANs 20, 40</text>
</g>
<g class="node-blue">
<rect x="265" y="664" width="120" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="325" y="684" text-anchor="middle" dominant-baseline="central">Board room</text>
<text class="ts" x="325" y="702" text-anchor="middle" dominant-baseline="central">VLANs 10, 20</text>
</g>
<g class="node-blue">
<rect x="398" y="664" width="130" height="56" rx="8" stroke-width="0.8"/>
<text class="th" x="463" y="684" text-anchor="middle" dominant-baseline="central">Open floor</text>
<text class="ts" x="463" y="702" text-anchor="middle" dominant-baseline="central">100 ports · 5 printers</text>
</g>

<!-- Legend -->
<rect x="20" y="748" width="12" height="12" rx="2" fill="#534AB7"/>
<text class="ts" x="38" y="754" dominant-baseline="central">Core / routing layer</text>
<rect x="20" y="770" width="12" height="12" rx="2" fill="#185FA5"/>
<text class="ts" x="38" y="776" dominant-baseline="central">Access layer (room switches)</text>
<rect x="20" y="792" width="12" height="12" rx="2" fill="#BA7517"/>
<text class="ts" x="38" y="798" dominant-baseline="central">Technicians office branch</text>
<rect x="20" y="814" width="12" height="12" rx="2" fill="#993C1D"/>
<text class="ts" x="38" y="820" dominant-baseline="central">Wireless access points</text>
<rect x="20" y="836" width="12" height="12" rx="2" fill="#0F6E56"/>
<text class="ts" x="38" y="842" dominant-baseline="central">Server infrastructure</text>
<rect x="20" y="858" width="12" height="12" rx="2" fill="#3a4a60"/>
<text class="ts" x="38" y="864" dominant-baseline="central">ISP (simulated)</text>

</svg>
</div>

<footer>CISCO PACKET TRACER · COMPUTER NETWORKS PROJECT · NETWORK FLOW DIAGRAM</footer>

</body>
</html>
